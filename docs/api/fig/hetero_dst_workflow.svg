<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">TALE-SD heterogeneous graph workflow</title>
  <desc id="desc">Top row shows DST to GraphEvent schema. Bottom left shows HDF5 training cache path. Bottom right shows direct DST reconstruction with GraphEvent input and checkpoint input joining reconstruct-dst.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .lane { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263238; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263238; }
      .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #455a64; }
      .box { stroke: #263238; stroke-width: 1.4; rx: 8; ry: 8; }
      .schema { fill: #eef7f4; }
      .cache { fill: #fff3d6; }
      .model { fill: #e9f1ff; }
      .out { fill: #f5eef8; }
      .node { fill: #ffffff; stroke: #607d8b; stroke-width: 1.2; rx: 7; ry: 7; }
      .chip { fill: #ffffff; stroke: #90a4ae; stroke-width: 1; rx: 10; ry: 10; }
      .arrow { stroke: #263238; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .softarrow { stroke: #546e7a; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="820" fill="#ffffff"/>
  <text x="40" y="42" class="title">Heterogeneous graph workflow: training cache and direct DST reconstruction</text>

  <rect x="34" y="68" width="1212" height="290" class="box schema" opacity="0.55"/>
  <text x="58" y="96" class="lane">Graph schema from DST</text>

  <rect x="58" y="132" width="155" height="76" class="box schema"/>
  <text x="84" y="162" class="label">DST files</text>
  <text x="84" y="185" class="small">data / MC banks</text>

  <rect x="260" y="118" width="248" height="104" class="box schema"/>
  <text x="286" y="148" class="label">dstio.tale.graph</text>
  <text x="286" y="173" class="small">cleaning = ising</text>
  <text x="286" y="195" class="small">all candidates kept</text>
  <text x="286" y="215" class="small">Ising annotations added</text>

  <rect x="560" y="92" width="662" height="250" class="box schema"/>
  <text x="588" y="124" class="label">GraphEvent: tale_sd_hetero_ising_pulse_detector_graph_v1</text>

  <rect x="592" y="150" width="238" height="130" class="node"/>
  <text x="614" y="178" class="label">detector node</text>
  <text x="614" y="203" class="small">detector features + context</text>
  <text x="614" y="225" class="small">positions, lids</text>
  <text x="614" y="247" class="small">waveforms stored once</text>
  <text x="614" y="267" class="small">per detector</text>

  <rect x="934" y="150" width="238" height="130" class="node"/>
  <text x="956" y="178" class="label">pulse node</text>
  <text x="956" y="203" class="small">pulse features</text>
  <text x="956" y="225" class="small">Ising keep / removed</text>
  <text x="956" y="247" class="small">pulse_detector_index</text>
  <text x="956" y="267" class="small">pulse_bounds</text>

  <rect x="592" y="296" width="160" height="28" class="chip"/>
  <text x="612" y="315" class="tiny">pulse-pulse edges</text>
  <rect x="770" y="296" width="190" height="28" class="chip"/>
  <text x="788" y="315" class="tiny">detector-detector edges</text>
  <rect x="980" y="296" width="182" height="28" class="chip"/>
  <text x="999" y="315" class="tiny">detector-pulse edges</text>

  <path d="M213,170 C230,170 242,170 260,170" class="arrow"/>
  <path d="M508,170 C528,170 542,170 560,170" class="arrow"/>

  <rect x="58" y="400" width="590" height="210" class="box cache" opacity="0.55"/>
  <text x="82" y="430" class="lane">HDF5 training cache path</text>

  <rect x="82" y="468" width="142" height="70" class="box cache"/>
  <text x="104" y="498" class="label">export-hetero</text>
  <text x="104" y="520" class="small">write cache</text>

  <rect x="270" y="468" width="142" height="70" class="box cache"/>
  <text x="298" y="498" class="label">HDF5 shards</text>
  <text x="298" y="520" class="small">training only</text>

  <rect x="458" y="468" width="142" height="70" class="box model"/>
  <text x="485" y="498" class="label">train-hetero</text>
  <text x="485" y="520" class="small">fit scalers</text>

  <rect x="612" y="650" width="178" height="70" class="box model"/>
  <text x="636" y="680" class="label">checkpoint</text>
  <text x="636" y="702" class="small">model + scalers</text>

  <path d="M640,342 L640,378 L70,378 L70,503 L82,503" class="arrow"/>
  <path d="M224,503 C244,503 252,503 270,503" class="arrow"/>
  <path d="M412,503 C432,503 440,503 458,503" class="arrow"/>
  <path d="M600,503 C650,540 700,590 701,650" class="arrow"/>

  <rect x="708" y="400" width="504" height="210" class="box out" opacity="0.55"/>
  <text x="732" y="430" class="lane">Direct DST reconstruction path</text>

  <rect x="822" y="482" width="178" height="78" class="box out"/>
  <text x="850" y="512" class="label">reconstruct-dst</text>
  <text x="850" y="535" class="small">no HDF5 output</text>

  <rect x="1060" y="482" width="126" height="78" class="box out"/>
  <text x="1092" y="512" class="label">CSV</text>
  <text x="1084" y="535" class="small">reco output</text>

  <path d="M1068,342 L1068,378 L936,378 L936,482" class="arrow"/>
  <text x="944" y="394" class="tiny">GraphEvent input</text>

  <path d="M790,684 C845,656 872,598 892,560" class="arrow"/>
  <text x="814" y="684" class="tiny">checkpoint input</text>

  <path d="M1000,521 C1022,521 1040,521 1060,521" class="arrow"/>

  <text x="58" y="780" class="tiny">Boundary: dstio owns TALE graph construction. This repo owns cache storage, model conversion, training, diagnostics, and direct inference.</text>
</svg>
