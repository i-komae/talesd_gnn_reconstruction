<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">TALE-SD heterogeneous graph schema example</title>
  <desc id="desc">Detector nodes and pulse nodes are shown as a graph. Detector-detector, pulse-pulse, and detector-pulse edges are visually distinct. Detector feature fields and pulse feature fields are documented in side panels. Waveform windows are shown as detector-side brackets, while rejected pulses are represented only by dashed pulse-node outlines.</desc>
  <defs>
    <marker id="arrow-observe" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#455a64"/>
    </marker>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #263238; }
      .tiny { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #455a64; }
      .panel { fill: #ffffff; stroke: #90a4ae; stroke-width: 1.2; rx: 8; ry: 8; }
      .graph-bg { fill: #f7fbfd; stroke: #b0bec5; stroke-width: 1.2; rx: 10; ry: 10; }
      .det-node { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2.4; }
      .pulse-kept { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2.2; }
      .pulse-rej { fill: #fff8e1; stroke: #ef6c00; stroke-width: 2.2; stroke-dasharray: 7 5; }
      .node-label { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; text-anchor: middle; }
      .state-label { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #455a64; text-anchor: middle; }
      .edge-det { stroke: #1565c0; stroke-width: 3.2; fill: none; }
      .edge-pulse { stroke: #6a1b9a; stroke-width: 2.5; fill: none; }
      .edge-observe { stroke: #455a64; stroke-width: 1.8; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow-observe); }
      .wave-bg { fill: #ffffff; stroke: #607d8b; stroke-width: 1.1; rx: 5; ry: 5; }
      .wave-line { stroke: #546e7a; stroke-width: 2; fill: none; }
      .bracket { stroke: #d81b60; stroke-width: 4; fill: none; stroke-linecap: round; }
      .bracket-thin { stroke: #d81b60; stroke-width: 2; fill: none; stroke-linecap: round; }
      .legend-det { stroke: #1565c0; stroke-width: 3.2; fill: none; }
      .legend-pulse { stroke: #6a1b9a; stroke-width: 2.5; fill: none; }
      .legend-observe { stroke: #455a64; stroke-width: 1.8; stroke-dasharray: 7 5; fill: none; marker-end: url(#arrow-observe); }
      .legend-window { stroke: #d81b60; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="760" fill="#ffffff"/>
  <text x="40" y="42" class="title">Heterogeneous graph schema: nodes, typed edges, and detector waveform references</text>

  <rect x="50" y="78" width="760" height="610" class="graph-bg"/>
  <text x="76" y="110" class="label">Example GraphEvent</text>

  <line x1="250" y1="235" x2="555" y2="235" class="edge-det"/>
  <line x1="250" y1="235" x2="405" y2="500" class="edge-det"/>
  <line x1="555" y1="235" x2="405" y2="500" class="edge-det"/>

  <circle cx="250" cy="235" r="52" class="det-node"/>
  <text x="250" y="231" class="node-label">D1</text>
  <text x="250" y="251" class="state-label">detector</text>

  <circle cx="555" cy="235" r="52" class="det-node"/>
  <text x="555" y="231" class="node-label">D2</text>
  <text x="555" y="251" class="state-label">detector</text>

  <circle cx="405" cy="500" r="52" class="det-node"/>
  <text x="405" y="496" class="node-label">D3</text>
  <text x="405" y="516" class="state-label">detector</text>

  <circle cx="168" cy="130" r="30" class="pulse-kept"/>
  <text x="168" y="126" class="node-label">P1</text>
  <text x="168" y="145" class="state-label">kept</text>

  <circle cx="352" cy="135" r="30" class="pulse-rej"/>
  <text x="352" y="131" class="node-label">P2</text>
  <text x="352" y="150" class="state-label">rejected</text>

  <circle cx="660" cy="130" r="30" class="pulse-kept"/>
  <text x="660" y="126" class="node-label">P3</text>
  <text x="660" y="145" class="state-label">kept</text>

  <circle cx="548" cy="520" r="30" class="pulse-kept"/>
  <text x="548" y="516" class="node-label">P4</text>
  <text x="548" y="535" class="state-label">kept</text>

  <circle cx="270" cy="585" r="30" class="pulse-rej"/>
  <text x="270" y="581" class="node-label">P5</text>
  <text x="270" y="600" class="state-label">rejected</text>

  <path d="M190,145 C304,74 542,76 638,130" class="edge-pulse"/>
  <path d="M374,148 C484,196 584,188 640,146" class="edge-pulse"/>
  <path d="M374,154 C430,270 493,410 535,494" class="edge-pulse"/>
  <path d="M638,150 C718,272 668,474 575,512" class="edge-pulse"/>
  <path d="M535,535 C468,600 355,625 300,594" class="edge-pulse"/>
  <path d="M332,150 C250,290 236,472 260,556" class="edge-pulse" opacity="0.75"/>

  <line x1="220" y1="196" x2="184" y2="153" class="edge-observe"/>
  <line x1="278" y1="194" x2="336" y2="154" class="edge-observe"/>
  <line x1="594" y1="197" x2="638" y2="150" class="edge-observe"/>
  <line x1="444" y1="494" x2="519" y2="520" class="edge-observe"/>
  <line x1="368" y1="525" x2="294" y2="570" class="edge-observe"/>

  <rect x="96" y="626" width="650" height="38" class="panel"/>
  <text x="120" y="650" class="tiny">Ising rejected pulses are not hard-dropped: P2 and P5 remain as pulse nodes with rejected/removed annotation features.</text>

  <rect x="850" y="78" width="370" height="190" class="panel"/>
  <text x="878" y="110" class="label">Legend</text>
  <line x1="880" y1="138" x2="954" y2="138" class="legend-det"/>
  <text x="972" y="143" class="small">detector__near__detector</text>
  <line x1="880" y1="170" x2="954" y2="170" class="legend-pulse"/>
  <text x="972" y="175" class="small">pulse__interacts__pulse</text>
  <line x1="880" y1="202" x2="954" y2="202" class="legend-observe"/>
  <text x="972" y="207" class="small">detector__observes__pulse</text>
  <path d="M880,234 L954,234" class="legend-window"/>
  <text x="972" y="239" class="small">waveform window reference</text>

  <rect x="850" y="300" width="370" height="206" class="panel"/>
  <text x="878" y="330" class="label">Detector node fields</text>
  <text x="878" y="360" class="small">detector_features</text>
  <text x="878" y="386" class="small">detector_context_features</text>
  <text x="878" y="412" class="small">detector_waveforms</text>
  <text x="878" y="438" class="tiny">waveforms stored once per detector</text>
  <rect x="878" y="456" width="138" height="28" class="wave-bg"/>
  <path d="M884,472 C896,460 910,460 922,472 S946,486 960,472 S986,458 1008,472" class="wave-line"/>
  <path d="M936,456 L936,484 M984,456 L984,484 M936,484 L984,484" class="bracket-thin"/>
  <text x="1032" y="476" class="tiny">pulse_bounds window</text>

  <rect x="850" y="536" width="370" height="160" class="panel"/>
  <text x="878" y="566" class="label">Pulse node fields</text>
  <text x="878" y="596" class="small">pulse_features</text>
  <text x="878" y="622" class="small">ising_keep / ising_removed / support</text>
  <text x="878" y="648" class="small">pulse_detector_index -> detector node</text>
  <text x="878" y="674" class="small">pulse_bounds -> waveform range</text>
</svg>
